name: CloudPOS CI/CD pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Node.js environment
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # 1. TEST & VERIFY BACKEND
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend integration tests
        run: |
          cd backend
          npm test

      # 2. TEST & BUILD FRONTEND
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend static bundle
        run: |
          cd frontend
          npm run build
